<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GLAM ME Portfolio</title>

<link href="https://fonts.0&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Oswald',sans-serif;
    background:#000;
    color:white;
    transition:.3s;
}

body.light-mode{
    background:#f5f5f5;
    color:#111;
}

body.light-mode .about,
body.light-mode .social{
    background:#ffffff;
    color:#111;
}

body.light-mode nav{
    background:rgba(255,255,255,.9);
}

body.light-mode nav a{
    color:#111;
}

nav{

    position:fixed;
    top:0;
    width:100%;
    padding:25px 60px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(0,0,0,.6);

    backdrop-filter:blur(15px);

    z-index:1000;
}

.logo{
    font-size:40px;
    letter-spacing:5px;
    font-weight:700;
}

.menu{
    display:flex;
    align-items:center;
    gap:25px;
}

.menu a{
    color:white;
    text-decoration:none;
}

#themeToggle{
    padding:10px 15px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

.hero{

    height:100vh;

    background:
    linear-gradient(
    rgba(0,0,0,.4),
    rgba(0,0,0,.4)
    ),
    url("hero.jpg");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;
}

.hero-content h1{

    font-size:90px;
    letter-spacing:8px;
}

.hero-content p{

    margin-top:20px;
    font-size:24px;
}

.hero-btn{
    margin-top:30px;

    display:inline-block;

    padding:18px 50px;

    border:2px solid white;
    border-radius:50px;

    text-decoration:none;
    color:white;
}

.about{

    padding:100px 10%;
    background:#111;
}

.section-title{

    text-align:center;
    margin-bottom:50px;
    font-size:60px;
}

.about-content{

    text-align:center;
    max-width:900px;
    margin:auto;
}

.about-content p{

    font-size:22px;
    line-height:1.8;
}

.upload-section{

    padding:80px;
    background:#151515;
}

.upload-section h2{

    font-size:50px;
    margin-bottom:25px;
}

.editor-card{

    background:#202020;
    padding:20px;
    border-radius:20px;
    margin-top:25px;
}

.editor-card img{

    width:100%;
    max-height:400px;
    object-fit:cover;
    border-radius:15px;
}

.controls{

    margin-top:20px;
    display:grid;
    gap:15px;
}

.controls input{

    width:100%;
}

.controls textarea{

    width:100%;
    min-height:80px;
    border-radius:10px;
    padding:10px;
}

.publish-btn{

    padding:12px;
    border:none;
    background:#00bcd4;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.gallery{

    padding:80px;
    background:#f2f2f2;
}

.gallery-title{

    text-align:center;
    color:#111;
    font-size:60px;
    margin-bottom:50px;
}

.gallery-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

    gap:15px;
}

.photo-card{

    background:white;

    border-radius:15px;

    overflow:hidden;

    box-shadow:
    0 10px 30px rgba(0,0,0,.15);
}

.photo-card img{

    width:100%;
    display:block;

    cursor:pointer;

    transition:.3s;
}

.photo-card img:hover{

    transform:scale(1.03);
}

.card-body{

    padding:15px;
}

.card-desc{

    color:#333;
}

.social{

    background:#000;
    text-align:center;
    padding:100px 0;
}

.social h2{

    font-size:60px;
    margin-bottom:30px;
}

.social-links{

    display:flex;
    justify-content:center;
    gap:30px;
}

.social-links a{

    color:white;
    text-decoration:none;
}

footer{

    background:#050505;
    text-align:center;
    padding:30px;
}

.modal{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    display:none;

    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.95);

    z-index:9999;
}

.modal.active{
    display:flex;
}

.modal img{

    max-width:90%;
    max-height:90%;
}

</style>
</head>

<body>

<nav>

<div class="logo">
GLAM ME
</div>

<div class="menu">

<a hrefBOUT</a>
">UPLOAD</a>
<a href="#gallery id="themeToggle">
🌙
</button>

</div>

</nav>

<section class="hero">

<div class="hero-content">

<h1>NEW ALBUM OUT</h1>

<p>
Create Beautiful Visual Stories
</p>

<a href="#gallery
</section>

<section class="about" id="about">

<h2 class="section-title">
ABOUT
</h2>

<div class="about-content">

<p>
Upload photographs, edit brightness,
contrast and visual styling, add comments,
and publish directly into your portfolio gallery.
</p>

</div>

</section>

<section class="upload-section" id="upload">

<h2>
UPLOAD & EDIT PHOTOS
</h2>

<input
type="file"
id="imageUpload"
accept="image/*"
multiple>

<div id="editorContainer"></div>

</section>

<section class="gallery" id="gallery">

<h2 class="gallery-title">
PHOTO GALLERY
</h2>

<div
class="gallery-grid"
id="galleryGrid">
</div>

</section>

<section class="social">

<h2>SOCIAL</h2>

<div class="social-links">

#INSTAGRAM</a>
#
#SPOTIFY</a>

</div>

</section>

<footer>

© 2026 GLAM ME Portfolio

</footer>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

document
.getElementById("themeToggle")
.addEventListener("click",()=>{

document.body.classList.toggle(
"light-mode"
);

});

const upload =
document.getElementById("imageUpload");

const editorContainer =
document.getElementById("editorContainer");

const gallery =
document.getElementById("galleryGrid");

upload.addEventListener(
"change",
function(event){

[...event.target.files]
.forEach(file=>{

const reader =
new FileReader();

reader.onload =
function(e){

const imageSrc =
e.target.result;

const editor =
document.createElement("div");

editor.className =
"editor-card";

editor.innerHTML =
`
${imageSrc}

<div class="controls">

<label>Resize</label>
<input type="range"
class="size"
min="150"
max="800"
value="400">

<label>Brightness</label>
<input type="range"
class="brightness"
min="50"
max="200"
value="100">

<label>Contrast</label>
<input type="range"
class="contrast"
min="50"
max="200"
value="100">

<label>Grayscale</label>
<input type="range"
class="gray"
min="0"
max="100"
value="0">

<textarea
class="caption"
placeholder="Add comments">
</textarea>

<button
class="publish-btn">
Publish
</button>

</div>
`;

editorContainer.appendChild(editor);

const img =
editor.querySelector(".preview");

const size =
editor.querySelector(".size");

const brightness =
editor.querySelector(".brightness");

const contrast =
editor.querySelector(".contrast");

const gray =
editor.querySelector(".gray");

function update(){

img.style.width =
size.value+"px";

img.style.filter =
`
brightness(${brightness.value}%)
contrast(${contrast.value}%)
grayscale(${gray.value}%)
`;

}

update();

size.oninput = update;
brightness.oninput = update;
contrast.oninput = update;
gray.oninput = update;

editor
.querySelector(".publish-btn")
.onclick = ()=>{

const card =
document.createElement("div");

card.className =
"photo-card";

card.innerHTML =
`
${imageSrc}

<div class="card-body">

<div class="card-desc">
${editor.querySelector(".caption").value}
</div>

</div>
`;

gallery.appendChild(card);

const galleryImage =
card.querySelector("img");

galleryImage.addEventListener(
"click",
()=>{

document
.getElementById("modal")
.classList.add("active");

document
.getElementById("modalImg")
.src=
galleryImage.src;

});
};

};

reader.readAsDataURL(file);

});

});

document
.getElementById("modal")
.addEventListener(
"click",
()=>{

document
.getElementById("modal")
.classList.remove("active");

});

</script>

</body>
</html>
